<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYFELMUN | Where Vision Becomes Voice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2596be; 
        }

        body {
            background-color: #000;
        }

        nav {
            background-color: #4a0404;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
        }

        .apply-btn {
            background-color: #1a1a1a;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #f7f1e3;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('rayfelmun.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-content {
            background-color: rgba(74, 4, 4, 0.85);
            padding: 50px;
            border-radius: 15px;
            max-width: 800px;
            width: 90%;
            border: 1px solid rgba(247, 241, 227, 0.2);
        }

        /* Ortadaki RAYFELMUN yazısı rengi */
        .hero-content h1 {
            font-size: clamp(40px, 8vw, 80px);
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: #2596be; 
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .time-box span {
            display: block;
            font-size: clamp(24px, 5vw, 40px);
            font-weight: bold;
        }

        .slogan {
            font-style: italic;
            margin-top: 40px;
            opacity: 0.9;
        }

        footer {
            background-color: #4a0404;
            padding: 40px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Alt kısımdaki RAYFELMUN'25 özel renklendirme */
        .footer-logo h2 { 
            letter-spacing: 2px; 
        }
        
        .footer-logo .quote { color: #000000; } /* Siyah tırnak */
        .footer-logo .year { color: #2596be; }  /* Turkuaz 25 */

        .footer-links ul { list-style: none; }
        .footer-links a { text-decoration: none; font-size: 14px; opacity: 0.8; }

        .social-icons a {
            font-size: 28px;
            transition: transform 0.3s;
            display: inline-block;
        }
        
        .social-icons a:hover { transform: scale(1.1); }

        .copyright {
            text-align: center;
            padding: 15px;
            background-color: #350303;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <span>RAYFELMUN</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">About</a></li>
            <li><a href="#">Committees</a></li>
            <li><a href="#">Team</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <a href="#" class="apply-btn">Apply Now</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>RAYFELMUN</h1>
            <div class="countdown">
                <div class="time-box"><span id="days">00</span> Days</div>
                <div class="time-box"><span id="hours">00</span> Hours</div>
                <div class="time-box"><span id="minutes">00</span> Mins</div>
                <div class="time-box"><span id="seconds">00</span> Secs</div>
            </div>
            <p class="slogan">Where vision becomes voice</p>
        </div>
    </section>

    <footer>
        <div class="footer-logo">
            <h2>RAYFELMUN<span class="quote">'</span><span class="year">25</span></h2>
            <p style="font-size: 12px; opacity: 0.7;">14 June 2026</p>
        </div>
        
        <div class="footer-links">
            <ul>
                <li><a href="#">Terms & Conditions</a></li>
                <li><a href="#">Privacy Policy</a></li>
            </ul>
        </div>

        <div class="social-icons">
            <a href="https://www.instagram.com/rayfelmun/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </footer>

    <div class="copyright">
        © rayfelmun2026 | Developed by Ada Özkan
    </div>

    <script>
        const targetDate = new Date("Jun 14, 2026 09:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0"+d : d;
            document.getElementById("hours").innerText = h < 10 ? "0"+h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0"+m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0"+s : s;
        }, 1000);
    </script>
</body>
</html>
