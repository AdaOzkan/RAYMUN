<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committees | RAYMUN '26</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Mevcut Stillerin Devamı */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0101; color: white; line-height: 1.6; }

        /* Navigasyon ve Grid ayarları (Önceki kodunla aynı) */
        nav { background-color: #4a0404; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-area img { height: 35px; width: auto; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; text-transform: uppercase; font-size: 13px; opacity: 0.8; }
        .apply-btn { background-color: #1a1a1a; color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 13px; }

        .page-header { padding: 150px 5% 50px 5%; text-align: center; }
        .committees-container { max-width: 1200px; margin: 0 auto 100px auto; padding: 0 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }

        /* Kart Tasarımı */
        .committee-card { position: relative; height: 280px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; cursor: pointer; }
        .card-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; transition: 0.6s; filter: brightness(0.7); }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.92) 15%, rgba(45, 10, 10, 0.6) 100%); z-index: 2; mix-blend-mode: multiply; }
        .card-content { position: relative; z-index: 3; padding: 30px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .card-top { display: flex; justify-content: space-between; font-size: 13px; letter-spacing: 3px; opacity: 0.7; text-transform: uppercase; }
        .card-title { font-size: 36px; font-weight: bold; }

        /* === MODAL (BİLGİ KARTI) STİLLERİ === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(5px);
        }

        .modal-card {
            width: 90%; max-width: 700px; max-height: 85vh;
            background-color: #4a0404; border-radius: 20px;
            position: relative; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalFade 0.4s ease;
        }

        @keyframes modalFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .modal-header-img {
            width: 100%; height: 200px; background-size: cover; background-position: center;
            position: relative;
        }

        .modal-header-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(74, 4, 4, 0.2), #4a0404);
        }

        .modal-close {
            position: absolute; top: 20px; right: 20px; font-size: 24px;
            color: white; cursor: pointer; z-index: 10; opacity: 0.7;
        }

        .modal-body { padding: 40px; position: relative; margin-top: -60px; }
        .modal-tag { font-size: 12px; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }
        .modal-title { font-size: 42px; font-weight: bold; margin: 10px 0; }
        .modal-topic { font-size: 16px; font-style: italic; margin-bottom: 25px; opacity: 0.9; color: #ffcccc; }
        .modal-desc { font-size: 15px; line-height: 1.8; opacity: 0.8; margin-bottom: 30px; text-align: justify; }

        .study-guide-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px 25px; border-radius: 12px;
            text-decoration: none; font-weight: 600; transition: 0.3s;
        }
        .study-guide-btn:hover { background: white; color: #4a0404; }

        /* Footer vb. */
        footer { background-color: #4a0404; padding: 60px 8%; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 40px; }
        .bottom-bar { background-color: #4a0404; padding: 20px 8%; display: flex; justify-content: space-between; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="raymunlogo.jpg" alt="Logo">
            <span>RAYMUN</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="committees.html">Committees</a></li>
        </ul>
        <a href="#" class="apply-btn">Apply Now</a>
    </nav>

    <header class="page-header">
        <h4>Committees</h4>
        <h2>Our Committees</h2>
    </header>

    <main class="committees-container">
        <div class="committee-card" onclick="openModal('DISEC', 'GA - 1', 'disec.jpg', 'Establishing International Legal Norms for Artificial Intelligence in Armed Conflict', 'The Disarmament and International Security Committee (DISEC) deals with challenges to international peace. AI development in warfare raises critical questions regarding conflict norms and human rights.')">
            <div class="card-image" style="background-image: url('disec.jpg');"></div>
            <div class="card-overlay"></div>
            <div class="card-content">
                <div class="card-top"><span>GA - 1</span><span>RAYMUN</span></div>
                <h3 class="card-title">DISEC</h3>
            </div>
        </div>

        <div class="committee-card" onclick="openModal('WHO', 'GA - 2', 'who.jpg', 'Global Health Security and Pandemic Preparedness', 'The World Health Organization (WHO) is a specialized agency of the UN responsible for international public health. Its main objective is the attainment by all peoples of the highest possible level of health.')">
            <div class="card-image" style="background-image: url('who.jpg');"></div>
            <div class="card-overlay"></div>
            <div class="card-content">
                <div class="card-top"><span>GA - 2</span><span>RAYMUN</span></div>
                <h3 class="card-title">WHO</h3>
            </div>
        </div>
        
        </main>

    <div id="committeeModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <i class="fas fa-times modal-close" onclick="closeModal()"></i>
            <div id="modalImg" class="modal-header-img">
                <div class="modal-header-overlay"></div>
            </div>
            <div class="modal-body">
                <span id="modalTag" class="modal-tag"></span>
                <h2 id="modalTitle" class="modal-title"></h2>
                <p id="modalTopic" class="modal-topic"></p>
                <div id="modalDesc" class="modal-desc"></div>
                <a href="#" class="study-guide-btn"><i class="fas fa-external-link-alt"></i> View Study Guide</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-brand">
            <img src="raymunlogo.jpg" alt="Logo">
            <h2>RAYMUN26</h2>
            <p>Where vision becomes voice</p>
        </div>
        </footer>

    <script>
        function openModal(title, tag, img, topic, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalTag').innerText = tag + ' | RAYMUN';
            document.getElementById('modalTopic').innerText = topic;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalImg').style.backgroundImage = "url('" + img + "')";
            
            document.getElementById('committeeModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Arka plan kaymasını engeller
        }

        function closeModal() {
            document.getElementById('committeeModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Dışarı tıklayınca kapanma
        window.onclick = function(event) {
            let modal = document.getElementById('committeeModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
