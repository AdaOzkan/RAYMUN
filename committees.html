<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committees | RAYMUN '26</title>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Genel Temeller */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at center, #003c6d 0%, #000041 100%); color: white; line-height: 1.6; overflow-x: hidden; min-height: 100vh; }

        /* Northwell stili için özel sınıf */
        .northwell-text { 
            font-family: 'Brush Script MT', 'Cursive', sans-serif; /* Sistemde Northwell yoksa el yazısı görünümü için */
            font-size: 28px;
            color: #ff9999;
            text-transform: none;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }

        /* Navigasyon */
        nav {
            background: linear-gradient(to bottom, #142948 0%, #1a1a1a 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; text-decoration: none; color: white; }
        .logo-area img { height: 50px; }
        .logo-area span { font-weight: 600; letter-spacing: 2px; font-size: 18px; text-transform: uppercase; }

        .nav-links { list-style: none; display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; text-transform: uppercase; font-size: 11px; font-weight: 600; opacity: 0.8; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: #ff9999; }

        /* Başlık Bölümü Düzenlemeleri */
        .page-header { 
            padding: 180px 5% 60px 5%; 
            text-align: center; 
            background: radial-gradient(circle at center, #1a0202 0%, #0b0101 100%);
        }
        .page-header h2 { 
            font-family: 'Antonio', sans-serif; /* Antonio Fontu */
            font-size: clamp(45px, 8vw, 75px); 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 50%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Grid Sistemi */
        .committees-container {
            max-width: 1200px;
            margin: 0 auto 100px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        /* Kart Tasarımı */
        .committee-card {
            position: relative;
            height: 280px;
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .committee-card.full-width { grid-column: span 2; max-width: 585px; margin: 0 auto; width: 100%; }
        .card-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; transition: 0.6s; filter: grayscale(30%); }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; transition: 0.4s; }

        /* Renk Efektleri */
        .disec-effect .card-overlay { background: linear-gradient(to top, #781414 10%, rgba(120, 20, 20, 0.4) 100%); }
        .who-effect .card-overlay { background: linear-gradient(to top, #3d7761 10%, rgba(61, 119, 97, 0.4) 100%); }
        .undc-effect .card-overlay { background: linear-gradient(to top, #8c6b3d 10%, rgba(140, 107, 61, 0.4) 100%); }
        .unsc-effect .card-overlay { background: linear-gradient(to top, #b85c38 10%, rgba(184, 92, 56, 0.4) 100%); }
        .jcc-effect .card-overlay { background: linear-gradient(to top, #53354a 10%, rgba(106, 30, 85, 0.4) 100%); }

        .committee-card:hover { transform: translateY(-10px); }
        .committee-card:hover .card-image { transform: scale(1.1); filter: grayscale(0%); }

        .card-content { position: relative; z-index: 3; padding: 30px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-family: 'Antonio', sans-serif; font-size: 36px; font-weight: bold; text-transform: uppercase; }

        /* Footer Düzenlemeleri */
        footer { background-color: #1a1a1a; padding: 80px 8% 40px 8%; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 40px; }
        .footer-brand h2 { 
            font-family: 'Antonio', sans-serif; /* Antonio Fontu */
            font-size: 42px; 
            letter-spacing: 2px; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .bottom-bar { background-color: #1a1a1a; padding: 25px 8%; display: flex; justify-content: space-between; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1); }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-card { width: 90%; max-width: 750px; max-height: 85vh; border-radius: 25px; overflow-y: auto; position: relative; }
        .modal-title { font-family: 'Antonio', sans-serif; font-size: 48px; font-weight: bold; margin: 10px 0; }

        @media (max-width: 768px) { .committees-container { grid-template-columns: 1fr; } .footer-brand h2 { font-size: 32px; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="raymunlogo.jpg" alt="Logo">
            <span>RAYMUN</span>
        </a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="committees.html">Committees</a></li>
            <li><a href="#" class="apply-btn">Apply Now</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <span class="northwell-text">Our Agenda</span>
        <h2>COMMITTEES</h2>
    </header>

    <main class="committees-container">
        <div class="committee-card disec-effect" onclick="openModal('DISEC', 'GA - 1', 'disec.jpg', 'Establishing International Legal Norms for Artificial Intelligence', 'Description...', '#781414')">
            <div class="card-image" style="background-image: url('disec.jpg');"></div>
            <div class="card-overlay"></div>
            <div class="card-content">
                <div class="card-top"><span>GA - 1</span><span>RAYMUN</span></div>
                <h3 class="card-title">DISEC</h3>
            </div>
        </div>
        </main>

    <footer>
        <div class="footer-brand">
            <img src="raymunlogo.jpg" alt="Logo" style="height: 100px; margin-bottom: 15px;">
            <h2>RAYMUN2026</h2>
            <p>Where vision becomes voice</p>
        </div>
        <div class="footer-col">
            <h4>CONFERENCE</h4>
            <ul style="list-style: none;">
                <li><a href="#" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.7;">Home</a></li>
                <li><a href="#" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.7;">Committees</a></li>
            </ul>
        </div>
    </footer>

    <div class="bottom-bar">
        <div>© raymun2026</div>
        <div>Crafted with ❤️ by Ada Özkan</div>
    </div>

    </body>
</html>
