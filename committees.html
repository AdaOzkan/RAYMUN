<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committees | RAYMUN '26</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Genel Temeller */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0101; color: white; line-height: 1.6; overflow-x: hidden; }

        /* Navigasyon - Görseldeki Premium Stil */
        nav {
            background: linear-gradient(to bottom, #4a0404 0%, #2a0202 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; text-decoration: none; color: white; }
        .logo-area img { height: 40px; width: auto; filter: brightness(1.2); }
        .logo-area span { font-weight: 600; letter-spacing: 2px; font-size: 18px; }

        .nav-links { list-style: none; display: flex; gap: 30px; align-items: center; }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            opacity: 0.8; 
            transition: 0.3s ease; 
        }
        .nav-links a:hover { opacity: 1; color: #ff9999; }

        .apply-btn { 
            background-color: #1a1a1a; 
            color: white; 
            padding: 10px 25px; 
            border-radius: 25px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .apply-btn:hover { background-color: white; color: black; transform: translateY(-2px); }

        /* Başlık Bölümü - Görseldeki 'Committees' Estetiği */
        .page-header { 
            padding: 180px 5% 60px 5%; 
            text-align: center; 
            background: radial-gradient(circle at center, #1a0202 0%, #0b0101 100%);
        }
        .page-header h4 { 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-size: 12px; 
            opacity: 0.5; 
            margin-bottom: 20px; 
            color: #ffffff;
        }
        .page-header h2 { 
            font-size: clamp(40px, 7vw, 68px); 
            font-weight: 700; 
            letter-spacing: -1px; 
            background: linear-gradient(to bottom, #ffffff 50%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Diğer CSS kurallarınız (Grid, Modal, Footer) aşağıda aynı kalacak... */
